<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrismStar</title>
  <link rel="stylesheet" href="Style/sanitize.css">
  <link rel="stylesheet" href="Style/body.css">
  <link rel="stylesheet" href="Style/header.css">
  <link rel="stylesheet" href="Style/form-main.css">
  <link rel="stylesheet" href="Style/footer.css">

</head>



<body class="site-body">

  <header id="site-header" class="site-header">
    <div class="header-inner">
      <button id="hamburger" class="hamburger">
        <span></span><span></span><span></span>
      </button>

      <div class="site-brand">
        <h1 class="site-title"><a href="gallery-list.html">PrismStar</a></h1>
        <p class="site-tagline">Shine in every color.</p>
      </div>

      <nav class="header-menu">
        <ul class="header-nav">
          <li class="nav-icon">
            <img src="https://placehold.jp/100x100.png" alt="作者アイコン" class="icon">
          </li>

          <template id="nav-item-template">
            <li><a class="header-a" href="{HREF}">{LABEL}</a></li>
          </template>
        </ul>
      </nav>
    </div>
  </header>

	<main class="form-main">
        <section class="form-page">
            <div class="site-title">
                <h1>PrismStar</h1>
                <p class="card-tagline">Shine in every color.</p>
            </div>
            <div>
                <h1 class="page-title">お問合せフォーム</h1>
            </div>

            <form id="contactForm" class="site-form">
                <div>
                    <div>
                        <span class="required-item">必須</span>
                        <label for="first-name">姓</label>
                        <input class="form-box" type="text" name="first-name" id="first-name" 
                        placeholder="first name（必須）" required>    
                    </div>
                    <div>
                        <span class="required-item">必須</span>
                        <label for="last-name">名</label>
                        <input class="form-box" type="text" name="last-name" id="last-name" 
                        placeholder="last name（必須）" required>        
                    </div>
                </div>

                <div>
                    <span class="required-item">必須</span>
                    <label for="mail">メールアドレス</label>
                    <input class="form-box"  type="email" name="mail" id="mail" 
                    placeholder="mail address（必須）" required>
                </div>

                <div class="msg-form">
                    <span class="any-item">任意</span>
                    <label for="message">お問合せ内容</label>
                    <textarea class="msg-box"  name="message" placeholder="お問合せ内容を記載ください（任意）"></textarea>
                </div>
                <button type="submit">送信する</button>
            </form>
        </section>
	</main>

    <footer id="site-footer" class="site-footer">
        <div class="footer-info">
            <p class="footer-corporate">&copy; 2025 Miz..Kingdom</p>
            <p>Developer：Miz Kingdom</p>
            <p>Mail: <a class="footer-a" href="mailto:okubo.m.jobs@gmail.com">okubo.m.jobs@gmail.com</a></p>
        </div>

        <nav class="footer-nav">
            <ul>
                <template id="nav-item-template">
                    <li><a class="footer-a" href="{HREF}">{LABEL}</a></li>
                </template>
            </ul>
        </nav>

        <div class="footer-social">
            <a class="footer-a" href="https://github.com/mokubo1228-hub" target="_blank">
                <img src="Image/review-icon.png" alt="Review">
            </a>
            <a class="footer-a" href="https://twitter.com" target="_blank">
                <img src="Image/x-icon.png" alt="X">
            </a>
            <a class="footer-a" href="https://github.com" target="_blank">
                <img src="Image/Github-icon.png" alt="GitHub">
            </a>
            <a class="footer-a" href="https://linkedin.com" target="_blank">
                <img src="Image/linkedin-icon.png" alt="LinkedIn">
            </a>
        </div>
    </footer>

  <script src="Script/common.js"></script>
  <script src="Script/form.js"></script>
</body>
</html>
